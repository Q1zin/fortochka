name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Линты и тесты
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  android:
    name: Android-сборка
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # NDK предустановлен на ubuntu-раннерах — cargo-ndk найдёт его по этой переменной
      - name: Настроить NDK
        run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
      - name: Kotlin-биндинги (uniffi)
        run: bash scripts/gen-bindings.sh
      - name: Rust-ядро для Android
        run: cargo ndk -t arm64-v8a -t armeabi-v7a -o android/app/src/main/jniLibs build -p fortochka-mobile --release
      - name: Gradle assembleDebug
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: fortochka-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  deploy:
    name: Деплой на сервер
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [rust, android]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/q1zin/fortochka-server:latest
            ghcr.io/q1zin/fortochka-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Скопировать compose-файлы
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/docker-compose.yml,deploy/Caddyfile
          target: /opt/fortochka/
          strip_components: 1
      - name: Перезапустить сервисы
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/fortochka
            docker compose pull
            docker compose up -d
            docker image prune -f
